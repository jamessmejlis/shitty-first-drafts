name: Submit your ugly MVP
description: Get your embarrassing first version featured next to Airbnb's.
title: "Ugly MVP: <your product name>"
labels: [submission]
body:
  - type: input
    id: handle
    attributes:
      label: Your handle
      placeholder: "@yourname"
    validations: { required: true }
  - type: input
    id: founder_link
    attributes:
      label: Your link
      description: X, site, GitHub — where should we credit you? Optional; we'll fall back to your product link.
      placeholder: https://x.com/you
    validations: { required: false }
  - type: input
    id: product
    attributes:
      label: Product
      placeholder: What's it called?
    validations: { required: true }
  - type: input
    id: link
    attributes:
      label: Link
      placeholder: https://
    validations: { required: true }
  - type: textarea
    id: story
    attributes:
      label: What's embarrassing about it?
      description: Ugly screens, manual hacks, selling before building, duct-taped demos — all count.
    validations: { required: true }
  - type: input
    id: tactics
    attributes:
      label: Tactics
      description: "Which apply? Ugly v1 · Did things that don't scale · Sold it first · Duct-taped it"
    validations: { required: false }
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot of the ugly version
      description: Drag and drop your ugly v1 screenshot here — this is where it's stored.
    validations: { required: true }
